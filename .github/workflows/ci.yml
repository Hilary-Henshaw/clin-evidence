name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Type check
        run: mypy src/clinevidence

  test:
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=src/clinevidence \
            --cov-report=xml
        env:
          deployment_name: test-deployment
          model_name: gpt-4o
          azure_endpoint: https://test.openai.azure.com/
          openai_api_key: test-key
          openai_api_version: "2024-02-15"
          embedding_deployment_name: test-embedding
          embedding_model_name: text-embedding-ada-002
          embedding_azure_endpoint: https://test.openai.azure.com/
          embedding_openai_api_key: test-key
          embedding_openai_api_version: "2024-02-15"
          ELEVEN_LABS_API_KEY: test-key
          TAVILY_API_KEY: test-key
          SESSION_SECRET_KEY: test-secret-key-for-ci
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t clinevidence:${{ github.sha }} .
